defaults:
  - _self_ # inline は default 扱い、preset で上書き可能に
  - surrogate: hh


surrogate:
  type: sindy
  init:
    datasets:
      dt: 0.01
    train_comp_identifier: soma
    n_components: 1 # 潜在方程式の次元 (preset で上書き)
  fit:
    optimizer:
      type: stlsq
      threshold: 0.01
      normalize_columns: false
      alpha: 2.0

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    # --multirun 既定 = hh/traub × type × n_components × preprocessor の直積 (16 run)
    # 単発実行では無効 (sweeper は multirun 時のみ効く)
    params:
      surrogate.type: sindy,hybrid
      surrogate.init.n_components: 1,2
      surrogate.fit.preprocessor.type: pca,ae
