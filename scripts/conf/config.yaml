defaults:
  - current_generators: base
  - _self_ # ショートカット定義は最後に設定

matplotlib_style: paper

# ==========================================
# データセット設定
# ==========================================
datasets_settings:
  common:
    dt: 0.01 #[ms]
    silence_duration: 10 #[ms]
  train:
    duration: 9000 #[ms]
    current_seed: 991927697
    model_name: hh
    pipeline: 
      - ${current_generators.discretized}
  sweep:
    common:
      model_name: hh
      duration: 800
    type: random
    catalog:
      random: [9919, 9920]
      steady: {start: 0, stop: 30, step: 1 }

# ==========================================
# SINDy Settings (モデル抽出設定)
# ==========================================
lib:
  lib_base:
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: volt
      inputs: [0, 1, 2]
    - type: identity
      inputs: [0, 1, 2]
    - type: const
      inputs: []
  lib_hh_informed:
    - type: gate_poly_volt
      max_power: 4
      inputs: [0, 1]
    - type: gate
      funcs: [alpha_m,  alpha_h, alpha_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: identity
      inputs: [0, 2]
    - type: const
      inputs: []
  lib_hh_relaxation:
    - type: gate_poly_volt
      max_power: 4
      inputs: [0, 1]
    - type: identity
      inputs: [0, 2]
    - type: const
      inputs: []
    # --- dg0/dt 用 (relaxation形式) ---
    # alpha_k(V): 1変数 → inputs[0] = [0] (Vのみ)
    # (alpha_k+beta_k)(V)*g0: 2変数 → inputs[1] = [0, 1] (V, g0)
    - type: relaxation1
      gates: [m, h, n]
      inputs: [0]
    - type: relaxation2
      gates: [m, h, n]
      inputs: [0,1]



sindy:
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0
  library_specs: ${lib.lib_hh_informed}


hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    params:
      sindy.optimizer.alpha: 0.01, 0.05, 0.1, 0.5, 1.0