defaults:
  - current_generators: base
  - _self_ # ショートカット定義は最後に設定




# ==========================================
# 1. Global Settings (全体設定)
# ==========================================

matplotlib_style: paper
experiment_name: NeuroSurrogate

# ==========================================
# データセット設定
# ==========================================
datasets_settings:
  sweep_catalog: steady
  teaching_catalog: exp3

  common:
    dt: 0.01 #[ms]
    silence_duration: 10 #[ms]
    train:
      current_seed: 991927697
      duration: 9000 #[ms]
    test:
      duration: 800 #[ms]
      current_seed: 6

  catalog:
      random:
        data_type: hh
        dt: 0.01
        duration: 800
        silence_duration: 10
        current:
          current_seed: 6  # デフォルトのシード値
          pipeline:
            - ${current_generators.rand_pulse}
        sweep:
          current_seed: [9919, 9920]

      steady:
        data_type: hh
        dt: 0.01
        duration: 800
        silence_duration: 10
        current:
          current_seed: 6
          pipeline:
            - ${current_generators.steady}
        sweep:
          current:
            pipeline_ind: 0
            variable:
              value: {start: 0, stop: 20, step: 5}

      exp3:
        data_type: hh
        dt: 0.01
        duration: 9000
        silence_duration: 10
        current:
          current_seed: 991927697
          pipeline: 
            - ${current_generators.discretized}

# ==========================================
# 5. SINDy Settings (モデル抽出設定)
# ==========================================
sindy:
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0
  
  library_specs:
    - type: gate
      funcs: [alpha_m, alpha_h, alpha_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: volt
      specs: [[3, 2], [3, 1], [4, 1], [4, 0]]
      inputs: [0, 1, 2]
    - type: base
      inputs: [0, 1, 2]


hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    params:
      sindy.optimizer.alpha: range(1.0, 3.0,0.5)