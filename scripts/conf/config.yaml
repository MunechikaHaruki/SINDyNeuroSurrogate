defaults:
  - _self_ # ショートカット定義は最後に設定

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}

matplotlib_style: paper
experiment_name: tryDifferentTeachingCurrent

datasets_default:
  # デフォルト値の設定(シミュレーション)
  simulator_default_dt: 0.01 #[ms]
  simulator_default_duration: 800 #[ms]
  # デフォルト値の設定(電流生成)
  default_current_seed: 6
  silence_duration: 10 #[ms]
  train_duration: 9000 #[ms]

current_test_settings:
  steady:
    _target_: "generate_steady"
    params_sweep:
      value: 
        start: 0
        stop: 20
        step: 5
  random:
    _target_: "generate_rand_pulse"
    params_sweep:
      current_seed: [9919, 9920]
  ramp:
    _target_: "generate_ramp"
    params_sweep:
      stop:
        start: 5
        stop: 20
        step: 5  # → start=0固定で、stop=[5, 10, 15, 20]をスイープ
    params:
      start: 0.0
  sinusoidal:
    _target_: "generate_sinusoidal"
    params:
      baseline: 5.0
      frequency: 0.01
    params_sweep:
      amplitude: [2.0, 5.0, 10.0]

  chirp:
    _target_: "generate_chirp"
    params:
      f_start: 0.001
      f_stop: 0.01
      baseline: 5.0
    params_sweep:
      amplitude: [2.0, 5.0, 10.0]


# 組み合わせの定義（変わらない）
test_combinations:
  quick_check:
    models: [php]
    currents: [steady]
  full_eval:
    models: [php, hh]
    currents: [steady, random]
  random_only:
    models: [php, hh]
    currents: [random]



current_train_pipelines:
  discretized: &discretized #閾値付近と取りうる最大と最小付近に
    - _target_: neurosurrogate.utils.current_generators.generate_discretized
      options: [-5, 1.3, 6.3, 20]
      weights: [0.3, 1, 1, 1]
      sigma: 1
  rand_pulse: &rand_pulse
    - _target_: neurosurrogate.utils.current_generators.generate_rand_pulse
      baseline: 0
  gauss_rand_pulse: &gauss_rand_pulse
    - _target_: neurosurrogate.utils.current_generators.generate_gauss_rand_pulse
      mu: 6.2
      sigma: 5
      baseline: 0



teaching_settings:
  bachelor_thesis: #卒論の時の同じ、最も単純に電流を与えた結果
    data_type: hh
    current:
      pipeline: *rand_pulse
  exp2:
    data_type: hh
    current:
      pipeline: *gauss_rand_pulse
  exp3:
    data_type: hh
    target_comp_id: 0
    current:
      pipeline: *discretized
      current_seed: 991927697
  exp4:
    data_type: hh3
    current:
      pipeline: *rand_pulse


sindy:
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0


# プリセット
selected: exp3
active_test: quick_check