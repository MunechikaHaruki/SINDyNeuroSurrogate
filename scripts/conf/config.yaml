defaults:
  - current_generators: base
  - _self_ # ショートカット定義は最後に設定

matplotlib_style: paper

# ==========================================
# データセット設定
# ==========================================
datasets_settings:
  sweep_catalog: steady
  teaching_catalog: exp3

  common:
    dt: 0.01 #[ms]
    silence_duration: 10 #[ms]
    train:
      current_seed: 991927697
      duration: 9000 #[ms]
    test:
      current_seed: 6
      duration: 800 #[ms]

  catalog:
    random:
      data_type: hh
      dt: ${datasets_settings.common.dt}
      duration: ${datasets_settings.common.test.duration}
      silence_duration: ${datasets_settings.common.silence_duration}
      current:
        current_seed: ${datasets_settings.common.test.current_seed}
        pipeline:
          - ${current_generators.rand_pulse}
      sweep:
        current_seed: [9919, 9920]

    steady:
      data_type: hh
      dt: ${datasets_settings.common.dt}
      duration: ${datasets_settings.common.test.duration}
      silence_duration: ${datasets_settings.common.silence_duration}
      current:
        current_seed: ${datasets_settings.common.test.current_seed}
        pipeline:
          - ${current_generators.steady}
      sweep:
        current:
          pipeline_ind: 0
          variable:
            value: {start: 0, stop: 30, step: 5 }

    exp3:
      data_type: hh
      dt: ${datasets_settings.common.dt}
      duration: ${datasets_settings.common.train.duration}
      silence_duration: ${datasets_settings.common.silence_duration}
      current:
        current_seed: ${datasets_settings.common.train.current_seed}
        pipeline: 
          - ${current_generators.discretized}

# ==========================================
# SINDy Settings (モデル抽出設定)
# ==========================================
lib:
  lib_base:
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: volt
      inputs: [0, 1, 2]
    - type: identity
      inputs: [0, 1, 2]
    - type: const
      inputs: []
  lib_bilinear:
    - type: gate_poly_volt
      max_power: 4
      inputs: [0, 1]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: identity
      inputs: [0, 1, 2]
    - type: const
      inputs: []
  lib_binded:
    - type: gate_poly_volt
      max_power: 4
      inputs: [0, 1]
    - type: identity
      inputs: [0, 2]
    - type: const
      inputs: []
    # --- dg0/dt 用 (relaxation形式) ---
    # alpha_k(V): 1変数 → inputs[0] = [0] (Vのみ)
    # (alpha_k+beta_k)(V)*g0: 2変数 → inputs[1] = [0, 1] (V, g0)
    - type: relaxation
      gates: [m, h, n]
      inputs: [0,1]



sindy:
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: true
    alpha: 2.0
  library_specs: ${lib.lib_bilinear}


hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    params:
      sindy.optimizer.alpha: 0.01, 0.05, 0.1, 0.5, 1.0