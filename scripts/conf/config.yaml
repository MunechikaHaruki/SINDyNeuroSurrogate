defaults:
  - _self_ # inline は default 扱い、preset で上書き可能に
  - surrogate: hh


# type / init.n_components は各 surrogate preset が保持 (ansatz 固有のため config には置かない)
surrogate:
  init:
    datasets:
      dt: 0.01
    train_comp_identifier: soma
  fit:
    optimizer:
      type: stlsq
      threshold: 0.01
      normalize_columns: false
      alpha: 2.0

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
