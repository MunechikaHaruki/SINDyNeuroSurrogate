defaults:
  - _self_ # inline は default 扱い、preset で上書き可能に
  - sindy: base


sindy:
  type: sindy
  init:
    datasets:
      dt: 0.01
    train_comp_identifier: soma
  fit:
    optimizer:
      type: stlsq
      threshold: 0.01
      normalize_columns: false
      alpha: 2.0

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
  sweeper:
    params:
      sindy.fit.optimizer.alpha: 0.01, 0.05, 0.1, 0.5, 1.0
