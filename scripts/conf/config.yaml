defaults:
  - current_generators: base
  - _self_ # ショートカット定義は最後に設定

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}


# ==========================================
# 1. Global Settings (全体設定)
# ==========================================

matplotlib_style: paper
experiment_name: tryDifferentTeachingCurrent
active_test: quick_check

test_combinations:
  quick_check:
    models: [hh]
    currents: [steady]
  full_eval:
    models: [php, hh]
    currents: [steady, random]
  random_only:
    models: [php, hh]
    currents: [random]

# ==========================================
# 2. Defaults (デフォルト値)
# ==========================================
datasets_default:
  # デフォルト値の設定(シミュレーション)
  simulator_default_dt: 0.01 #[ms]
  simulator_default_duration: 800 #[ms]
  # デフォルト値の設定(電流生成)
  default_current_seed: 6
  silence_duration: 10 #[ms]
  train_duration: 9000 #[ms]


# ==========================================
# テスト（スイープ）設定（カタログを参照してスイープを追加）
# ==========================================
current_test_settings:
  steady:
    base: ${current_generators.steady}
    params_sweep:
      value: {start: 0, stop: 20, step: 5}
  random:
    base: ${current_generators.rand_pulse}
    params_sweep:
      current_seed: [9919, 9920]
  ramp:
    base: ${current_generators.ramp}
    params_sweep:
      stop: {start: 5, stop: 20, step: 5}
  sinusoidal:
    base: ${current_generators.sinusoidal}
    params_sweep:
      amplitude: [2.0, 5.0, 10.0]
  chirp:
    base: ${current_generators.chirp}
    params_sweep:
      amplitude: [2.0, 5.0, 10.0]

# ==========================================
# 訓練（Teaching）設定
# ==========================================
teaching_settings:
  bachelor_thesis:
    data_type: hh
    current:
      pipeline: 
        - ${current_generators.rand_pulse}
  exp2:
    data_type: hh
    current:
      pipeline: 
        - ${current_generators.gauss_rand_pulse}
  exp3:
    data_type: hh
    target_comp_id: 0
    current:
      pipeline: 
        - ${current_generators.discretized}
      current_seed: 991927697
  exp4:
    data_type: hh3
    current:
      pipeline: 
        - ${current_generators.rand_pulse}
# ==========================================
# 5. SINDy Settings (モデル抽出設定)
# ==========================================
sindy:
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0
  
  library_specs:
    - type: gate
      funcs: [alpha_m, alpha_h, alpha_n]
      is_product: false
      inputs: [0]
    - type: gate
      funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
      is_product: true
      inputs: [0, 1]
    - type: volt
      specs: [[3, 2], [3, 1], [4, 1], [4, 0]]
      inputs: [0, 1, 2]
    - type: base
      inputs: [0, 1, 2]
  
  teaching_current: exp3