defaults:
  - _self_ # inline は default 扱い、preset で上書き可能に
  - surrogate: hh


# surrogate 直下の 3 ブロックは SurrogateBundle.setup の宛先そのもの
# (meta=SurrogateMeta.build / preprocessor=preprocessor_cls.fit / ansatz=ansatz.fit)。
# 学習構造 (surrogate_type / preprocessor_type / n_components) は meta が単一源で、
# 値は各 preset が保持する。
surrogate:
  meta:
    datasets:
      dt: 0.01
    train_comp_identifier: soma
  preprocessor: {} # 種別固有 hyperparams のみ (ae: epochs/lr)。既定値は実装側
  ansatz:
    optimizer:
      type: stlsq
      threshold: 0.01
      normalize_columns: false
      alpha: 2.0

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}
