defaults:
  - experiment: default
  - _self_ # ショートカット定義は最後に設定

hydra:
  run:
    dir: hydra-outputs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: hydra-multiruns/${now:%Y-%m-%d_%H-%M-%S}

matplotlib_style: paper

# デフォルト値の設定(シミュレーション)
simulater_default_dt: 0.01 #[ms]
simulater_default_duration: 800 #[ms]
# デフォルト値の設定(電流生成)
default_current_seed: 6
silence_duration: 10 #[ms]

dataset_profiles:
  steady_currents: [ 0, 10, 20] #, 6.5, 6.3, 6.2, 7, 10, 15, 20]
  random_current_seeds: [9919,9920]
