# @package _global_
surrogate:
  init:
    datasets:
      model_name: traub
      current_type: train
    preprocessor:
      type: pca
  fit:
    library_specs:
      - type: traub_gate_forward
      - type: traub_gate_backward
      - type: traub_gate_forward_product
      - type: traub_gate_backward_product
      - type: basis

