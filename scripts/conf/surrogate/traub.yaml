# @package _global_
surrogate:
  meta:
    surrogate_type: hybrid
    preprocessor_type: ae
    n_components: 3  # 潜在方程式の次元
    datasets:
      model_name: traub
      current_type: train
  sindy:
    library_specs:
      - type: traub_gate_forward
      - type: traub_gate_backward
      - type: traub_gate_forward_product
      - type: traub_gate_backward_product
      - type: basis

hydra:
  sweeper:
    params:
      surrogate.meta.n_components: 2,3,4,5
      surrogate.meta.preprocessor_type: pca,ae
