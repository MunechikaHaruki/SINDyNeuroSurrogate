# @package _global_
surrogate:
  type: hybrid
  init:
    n_components: 3  # 潜在方程式の次元
    datasets:
      model_name: traub
      current_type: train
    preprocessor:
      type: ae
  fit:
    library_specs:
      - type: traub_gate_forward
      - type: traub_gate_backward
      - type: traub_gate_forward_product
      - type: traub_gate_backward_product
      - type: basis

hydra:
  sweeper:
    params:
      surrogate.init.n_components: 2,3
      surrogate.init.preprocessor.type: pca,ae