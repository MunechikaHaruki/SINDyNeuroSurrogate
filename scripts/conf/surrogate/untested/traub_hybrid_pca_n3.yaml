type: hybrid
init:
  n_components: 3
  datasets:
    model_name: traub
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: pca
  library_specs:
    - type: traub_gate_forward           # α(V) 8個
    - type: traub_gate_backward          # β(V) 8個
    - type: traub_gate_forward_product   # α(V)·g_k を全 latent に自動展開
    - type: traub_gate_backward_product  # β(V)·g_k を全 latent に自動展開
    - type: basis                        # g1..g3, V, 1 (全入力)
