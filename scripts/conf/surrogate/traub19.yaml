# @package _global_
surrogate:
  meta:
    comp_type: traub  # 置換対象のコンパートメント種類
    surrogate_type: hybrid
    preprocessor_type: ae
    n_components: 5  # 潜在方程式の次元
    datasets:
      model_name: traub19
      current_type: train
      # 19 comp 全部が学習軌道になる (ansatz/hybrid.py `train_source`) → 1 軌道を
      # 短くして総サンプル数を単体モデル (duration=9000) と同程度に揃える。
      current_params:
        duration: 1000
  ansatz:
    library_specs:
      - type: traub_gate_forward
      - type: traub_gate_backward
      - type: traub_gate_forward_product
      - type: traub_gate_backward_product
      - type: basis

hydra:
  sweeper:
    params:
      surrogate.meta.n_components: 2,3,4,5
      surrogate.meta.preprocessor_type: pca,ae
