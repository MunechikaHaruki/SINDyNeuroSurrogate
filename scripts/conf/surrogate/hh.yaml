# @package _global_
surrogate:
  meta:
    surrogate_type: hybrid
    preprocessor_type: ae
    n_components: 2  # 潜在方程式の次元
    datasets:
      model_name: hh
      current_type: train
  ansatz:
    library_specs:
      - type: hh_gate_forward
      - type: hh_gate_backward
      - type: hh_gate_forward_product
      - type: hh_gate_backward_product
      - type: basis

hydra:
  sweeper:
    params:
      surrogate.meta.n_components: 1,2
      surrogate.meta.preprocessor_type: pca,ae
