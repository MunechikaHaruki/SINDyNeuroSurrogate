# @package _global_
surrogate:
  type: hybrid
  init:
    n_components: 2  # 潜在方程式の次元
    datasets:
      model_name: hh
      current_type: train
    preprocessor:
      type: ae
  fit:
    library_specs:
      - type: hh_gate_forward
      - type: hh_gate_backward
      - type: hh_gate_forward_product
      - type: hh_gate_backward_product
      - type: basis

hydra:
  sweeper:
    params:
      surrogate.type: hybrid
      surrogate.init.n_components: 1,2
      surrogate.init.preprocessor.type: pca,ae