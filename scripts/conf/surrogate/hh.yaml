# @package _global_
surrogate:
  type: sindy
  init:
    n_components: 1  # 潜在方程式の次元
    datasets:
      model_name: hh
      current_type: train
    preprocessor:
      type: pca
  fit:
    library_specs:
      - type: hh_gate_forward
      - type: hh_gate_backward
      - type: hh_gate_forward_product
      - type: hh_gate_backward_product
      - type: basis

