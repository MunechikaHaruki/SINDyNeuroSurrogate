# @package _global_
surrogate:
  meta:
    surrogate_type: sindy
    preprocessor_type: pca
    n_components: 1  # 潜在方程式の次元
    datasets:
      model_name: hh
      current_type: train
  ansatz:
    library_specs:
      - type: gate_poly_volt  # latent の高次項・V 積 (1次は basis)
      - type: basis
      # --- dg0/dt 用 (relaxation形式 dg/dt = α(V) - (α+β)(V)·g) ---
      - type: hh_gate_forward      # 駆動項 α(V)
      - type: hh_relaxation_decay  # 減衰項 (α+β)(V)·g
