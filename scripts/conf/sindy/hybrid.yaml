type: hybrid
init:
  n_components: 3
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: pca
  library_specs:
    - type: hh_gate            # α(V), β(V) 6個
    - type: hh_gate_product    # α(V)·latent_k を全 latent に自動展開
    - type: basis              # latent1..3, V, 1 (全入力)
