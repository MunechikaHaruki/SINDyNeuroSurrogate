type: hybrid
init:
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: autoencoder
    n_components: 2
  optimizer:
    type: stlsq
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0
  library_specs:
    # SINDy 入力順: 0=latent1, 1=latent2, 2=V
    - type: hh_gate            # α(V), β(V) 6個
      inputs: [2]
    - type: hh_gate_product    # α(V)·latent1
      inputs: [2, 0]
    - type: hh_gate_product    # α(V)·latent2
      inputs: [2, 1]
    - type: basis              # latent1, latent2, V, 1
      inputs: [0, 1, 2]
