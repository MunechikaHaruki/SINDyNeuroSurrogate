init:
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: pca
  library_specs:
    - type: gate_poly_volt
    - type: basis
      latents: []   # V, u, 1 のみ (latent の基底は gate_poly_volt が供給)
    # --- dg0/dt 用 (relaxation形式) ---
    - type: hh_relaxation_driver
    - type: hh_relaxation_decay
