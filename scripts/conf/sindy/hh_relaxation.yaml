name: relaxation
init:
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    _target_: sklearn.decomposition.PCA
    n_components: 1
  optimizer:
    _target_: pysindy.optimizers.STLSQ
    threshold: 0.01
    normalize_columns: false
    alpha: 2.0
  library_specs:
    - type: gate_poly_volt
      inputs: [0, 1]
    - type: basis
      inputs: [0, 2]
    # --- dg0/dt 用 (relaxation形式) ---
    - type: hh_relaxation_driver
      inputs: [0]
    - type: hh_relaxation_decay
      inputs: [0, 1]
