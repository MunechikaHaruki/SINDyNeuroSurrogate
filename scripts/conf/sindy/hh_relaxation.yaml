name: relaxation
preprocessor:
  _target_: sklearn.decomposition.PCA
  n_components: 1
optimizer:
  _target_: pysindy.optimizers.STLSQ
  threshold: 0.01
  normalize_columns: false
  alpha: 2.0
library_specs:
  - type: gate_poly_volt
    inputs: [0, 1]
  - type: basis
    inputs: [0, 2]
  # --- dg0/dt 用 (relaxation形式) ---
  # inputs=[0]    → 駆動 alpha_k(V)
  # inputs=[0, 1] → 減衰 (alpha_k+beta_k)(V)*g0
  - type: relaxation
    inputs: [0]
  - type: relaxation
    inputs: [0, 1]
datasets:
  model_name: hh
  pipeline:
    _target_: neurosurrogate.registry.current.train
