init:
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: pca
  library_specs:
    - type: gate_poly_volt
    - type: hh_gate_forward
    - type: hh_gate_product
    - type: basis
      latents: []   # V, u, 1 のみ (latent の基底は gate_poly_volt が供給)
