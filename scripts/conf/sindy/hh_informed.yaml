init:
  datasets:
    model_name: hh
    current:
      type: train
      params: {}
fit:
  preprocessor:
    type: pca
    n_components: 1
  library_specs:
    - type: gate_poly_volt
      inputs: [0, 1]
    - type: hh_gate_forward
      inputs: [0]
    - type: hh_gate_product
      inputs: [0, 1]
    - type: basis
      inputs: [0, 2]
