name: hh_informed
preprocessor:
  _target_: sklearn.decomposition.PCA
  n_components: 1
optimizer:
  _target_: pysindy.optimizers.STLSQ
  threshold: 0.01
  normalize_columns: false
  alpha: 2.0
library_specs:
  - type: gate_poly_volt
    max_power: 4
    inputs: [0, 1]
  - type: gate
    funcs: [alpha_m,  alpha_h, alpha_n]
    is_product: false
    inputs: [0]
  - type: gate
    funcs: [alpha_m, beta_m, alpha_h, beta_h, alpha_n, beta_n]
    is_product: true
    inputs: [0, 1]
  - type: identity
    inputs: [0, 2]
  - type: const
    inputs: []
datasets:
  duration: 9000 #[ms]
  model_name: hh
  pipeline: 
    - _target_: neurosurrogate.builder.build_current.generate_discretized
      options: [-5, 1.3, 6.3, 20]
      weights: [0.3, 1, 1, 1]
      sigma: 1
      seed: 991927697
